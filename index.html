<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和太鼓リズムゲーム</title>

<style>
body{
    margin:0;
    background:#111;
    font-family:sans-serif;
    text-align:center;
    color:white;
    overflow:hidden;
}

h1{
    margin:10px;
}

#game{
    position:relative;
    width:100%;
    height:80vh;
    background:linear-gradient(#222,#000);
    overflow:hidden;
}

.lane{
    position:absolute;
    top:0;
    width:50%;
    height:100%;
}

#donLane{ left:0; border-right:2px solid #444; }
#kaLane{ right:0; }

.hitCircle{
    position:absolute;
    bottom:100px;
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid gold;
    left:50%;
    transform:translateX(-50%);
}

.note{
    position:absolute;
    width:80px;
    height:80px;
    border-radius:50%;
    left:50%;
    transform:translateX(-50%);
}

.don{ background:red; }
.ka{ background:deepskyblue; }

#score{
    font-size:20px;
    margin:10px;
}
</style>
</head>

<body>

<h1>和太鼓リズムゲーム</h1>
<div id="score">Score: 0</div>

<div id="game">
    <div id="donLane" class="lane">
        <div class="hitCircle"></div>
    </div>
    <div id="kaLane" class="lane">
        <div class="hitCircle"></div>
    </div>
</div>

<script>
const game = document.getElementById("game");
const scoreDisplay = document.getElementById("score");

let score = 0;
let notes = [];

function createNote(type){
    const note = document.createElement("div");
    note.classList.add("note", type);
    note.style.top = "-80px";
    note.dataset.type = type;

    if(type === "don"){
        document.getElementById("donLane").appendChild(note);
    }else{
        document.getElementById("kaLane").appendChild(note);
    }

    notes.push(note);
}

function update(){
    notes.forEach((note, index) => {
        let top = parseFloat(note.style.top);
        top += 4;
        note.style.top = top + "px";

        if(top > window.innerHeight){
            note.remove();
            notes.splice(index,1);
        }
    });
    requestAnimationFrame(update);
}

function checkHit(type){
    notes.forEach((note,index)=>{
        if(note.dataset.type === type){
            let rect = note.getBoundingClientRect();
            let hitZone = document.querySelector(
                type==="don" ? "#donLane .hitCircle" : "#kaLane .hitCircle"
            ).getBoundingClientRect();

            if(Math.abs(rect.top - hitZone.top) < 50){
                score += 100;
                scoreDisplay.textContent = "Score: " + score;
                note.remove();
                notes.splice(index,1);
            }
        }
    });
}

document.addEventListener("keydown", e=>{
    if(e.key === "ArrowLeft" || e.key === "ArrowRight"){
        checkHit("don");
    }
    if(e.key === "ArrowUp" || e.key === "ArrowDown"){
        checkHit("ka");
    }
});

setInterval(()=>{
    const rand = Math.random();
    if(rand > 0.5){
        createNote("don");
    }else{
        createNote("ka");
    }
},1000);

update();
</script>

</body>
</html>
