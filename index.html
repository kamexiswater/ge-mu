<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和太鼓リズムゲーム HARD</title>

<style>
body{
    margin:0;
    background:#0d0d0d;
    color:white;
    font-family:sans-serif;
    text-align:center;
    overflow:hidden;
}

h1{ margin:10px; }

#info{ font-size:14px; opacity:0.8; }

#scoreBoard{
    margin:5px;
    font-size:18px;
}

#judgement{
    font-size:40px;
    height:50px;
    margin:10px;
    font-weight:bold;
}

#game{
    position:relative;
    width:100%;
    height:75vh;
    background:linear-gradient(#111,#000);
    overflow:hidden;
}

.lane{
    position:absolute;
    width:50%;
    height:100%;
}

#donLane{ left:0; border-right:2px solid #333; }
#kaLane{ right:0; }

.hitCircle{
    position:absolute;
    bottom:120px;
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid gold;
    left:50%;
    transform:translateX(-50%);
}

.note{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:50%;
    left:50%;
    transform:translateX(-50%);
}

.don{ background:red; }
.ka{ background:deepskyblue; }

</style>
</head>

<body>

<h1>和太鼓リズムゲーム HARD</h1>
<div id="info">F＝ドン / J＝カッ</div>
<div id="scoreBoard">Score: 0 | Combo: 0</div>
<div id="judgement"></div>

<div id="game">
    <div id="donLane" class="lane">
        <div class="hitCircle"></div>
    </div>
    <div id="kaLane" class="lane">
        <div class="hitCircle"></div>
    </div>
</div>

<script>
let score = 0;
let combo = 0;
let notes = [];

const scoreBoard = document.getElementById("scoreBoard");
const judgementText = document.getElementById("judgement");

const speed = 8; // 高速化

function createNote(type){
    const note = document.createElement("div");
    note.classList.add("note", type);
    note.style.top = "-70px";
    note.dataset.type = type;

    const lane = type === "don" ? 
        document.getElementById("donLane") :
        document.getElementById("kaLane");

    lane.appendChild(note);
    notes.push(note);
}

function update(){
    notes.forEach((note,index)=>{
        let top = parseFloat(note.style.top);
        top += speed;
        note.style.top = top + "px";

        if(top > window.innerHeight){
            registerBad();
            note.remove();
            notes.splice(index,1);
        }
    });
    requestAnimationFrame(update);
}

function judge(diff){
    if(diff < 25){
        score += 300;
        combo++;
        showJudge("GREAT","gold");
    }else if(diff < 55){
        score += 100;
        combo++;
        showJudge("OK","lime");
    }else{
        registerBad();
    }
}

function registerBad(){
    combo = 0;
    showJudge("BAD","red");
}

function showJudge(text,color){
    judgementText.textContent = text;
    judgementText.style.color = color;
    scoreBoard.textContent = 
        "Score: " + score + " | Combo: " + combo;
}

function checkHit(type){
    notes.forEach((note,index)=>{
        if(note.dataset.type === type){
            let rect = note.getBoundingClientRect();
            let hitZone = document.querySelector(
                type==="don" ? "#donLane .hitCircle" :
                "#kaLane .hitCircle"
            ).getBoundingClientRect();

            let diff = Math.abs(rect.top - hitZone.top);
            judge(diff);

            note.remove();
            notes.splice(index,1);
        }
    });
}

document.addEventListener("keydown", e=>{
    if(e.key==="f"||e.key==="F") checkHit("don");
    if(e.key==="j"||e.key==="J") checkHit("ka");
});

// ノーツ出現頻度アップ
setInterval(()=>{
    createNote(Math.random()>0.5 ? "don":"ka");
},400);

update();
</script>

</body>
</html>
