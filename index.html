<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>1/2 10連チャレンジ - 扉ver</title>
<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: sans-serif;
    overflow: hidden;
}
#game {
    position: relative;
    width: 100vw;
    height: 100vh;
}
.door {
    position: absolute;
    bottom: 150px;
    width: 150px;
    height: 250px;
    background: #444;
    border: 4px solid white;
    text-align: center;
    line-height: 250px;
    font-size: 24px;
}
#leftDoor { left: 20%; }
#rightDoor { right: 20%; }

#player {
    position: absolute;
    bottom: 50px;
    left: 50%;
    width: 40px;
    height: 60px;
    background: #00ffcc;
    transform: translateX(-50%);
}

#info {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 20px;
}

#message {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 18px;
    min-height: 40px;
}
</style>
</head>
<body>

<div id="game">
    <div id="info">連続成功: 0 / 10　← → で移動して扉に触れろ</div>

    <div id="leftDoor" class="door">左の扉</div>
    <div id="rightDoor" class="door">右の扉</div>

    <div id="player"></div>

    <div id="message"></div>
</div>

<script>
let player = document.getElementById("player");
let leftDoor = document.getElementById("leftDoor");
let rightDoor = document.getElementById("rightDoor");
let message = document.getElementById("message");
let info = document.getElementById("info");

let pos = window.innerWidth / 2;
let streak = 0;

const insults = [
    "終了。1/2も当てられないとか逆に才能。",
    "その動きで勝てると思った？希望的観測。",
    "10連？まず1連を安定させようか。",
    "今の外し方、芸術的にダサい。",
    "確率に嫌われるってここまで露骨なんだね。",
    "1/1024の壁以前の問題だった。",
    "ドアの前で自信満々だったのにね。",
    "もう一回？学習機能ついてる？",
    "期待値が泣いてる。",
    "また最初から。人生もこんな感じ？"
];

function checkCollision(door, side) {
    const doorRect = door.getBoundingClientRect();
    const playerRect = player.getBoundingClientRect();

    if (
        playerRect.right > doorRect.left &&
        playerRect.left < doorRect.right
    ) {
        play(side);
    }
}

function play(choice) {
    const random = Math.floor(Math.random() * 2);

    if (choice === random) {
        streak++;
        message.textContent = "成功。まだ運が生きてる。";
        if (streak === 10) {
            message.textContent = "10連成功。確率1/1024突破。ちょっとだけ尊敬する。";
            streak = 0;
        }
    } else {
        const insult = insults[Math.floor(Math.random() * insults.length)];
        message.textContent = insult;
        streak = 0;
    }

    info.textContent = "連続成功: " + streak + " / 10　← → で移動して扉に触れろ";

    pos = window.innerWidth / 2;
    player.style.left = pos + "px";
}

document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowLeft") {
        pos -= 30;
    }
    if (e.key === "ArrowRight") {
        pos += 30;
    }

    player.style.left = pos + "px";

    checkCollision(leftDoor, 0);
    checkCollision(rightDoor, 1);
});
</script>

</body>
</html>
