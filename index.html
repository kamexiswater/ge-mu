<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和太鼓リズムゲーム 改良版</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:sans-serif;
    text-align:center;
    overflow:hidden;
}

h1{ margin:10px; }

#scoreBoard{
    font-size:18px;
    margin:5px;
}

#judge{
    font-size:42px;
    height:50px;
    font-weight:bold;
}

#game{
    position:relative;
    width:100%;
    height:75vh;
    background:linear-gradient(#111,#000);
    overflow:hidden;
}

.lane{
    position:absolute;
    width:50%;
    height:100%;
}

#donLane{ left:0; border-right:2px solid #333; }
#kaLane{ right:0; }

.hitCircle{
    position:absolute;
    bottom:150px;
    width:130px;
    height:130px;
    border-radius:50%;
    border:6px solid gold;
    left:50%;
    transform:translateX(-50%);
}

.note{
    position:absolute;
    width:80px;
    height:80px;
    border-radius:50%;
    left:50%;
    transform:translateX(-50%);
}

.don{ background:#ff2e2e; }
.ka{ background:#2ecbff; }

</style>
</head>
<body>

<h1>和太鼓リズムゲーム</h1>
<div>F＝ドン / J＝カッ</div>
<div id="scoreBoard">Score: 0 | Combo: 0</div>
<div id="judge"></div>

<div id="game">
    <div id="donLane" class="lane">
        <div class="hitCircle"></div>
    </div>
    <div id="kaLane" class="lane">
        <div class="hitCircle"></div>
    </div>
</div>

<script>
let score = 0;
let combo = 0;
let notes = [];

const speed = 12;
const judgeText = document.getElementById("judge");
const scoreBoard = document.getElementById("scoreBoard");

function spawn(type){
    const note = document.createElement("div");
    note.className = "note " + type;
    note.style.top = "-80px";
    note.dataset.type = type;

    const lane = type==="don"
        ? document.getElementById("donLane")
        : document.getElementById("kaLane");

    lane.appendChild(note);
    notes.push(note);
}

function update(){
    for(let i=notes.length-1;i>=0;i--){
        let note = notes[i];
        let top = parseFloat(note.style.top);
        top += speed;
        note.style.top = top + "px";

        if(top > window.innerHeight){
            miss(note,i);
        }
    }
    requestAnimationFrame(update);
}

function miss(note,index){
    combo = 0;
    showJudge("BAD","red");
    note.remove();
    notes.splice(index,1);
    updateScore();
}

function hit(type){
    const lane = type==="don"
        ? document.querySelector("#donLane .hitCircle")
        : document.querySelector("#kaLane .hitCircle");

    const hitY = lane.getBoundingClientRect().top;

    let closest = null;
    let closestIndex = -1;
    let minDiff = Infinity;

    for(let i=0;i<notes.length;i++){
        if(notes[i].dataset.type===type){
            let noteY = notes[i].getBoundingClientRect().top;
            let diff = Math.abs(noteY-hitY);
            if(diff < minDiff){
                minDiff = diff;
                closest = notes[i];
                closestIndex = i;
            }
        }
    }

    if(!closest) return;

    if(minDiff < 20){
        score += 300;
        combo++;
        showJudge("GREAT","gold");
    }
    else if(minDiff < 45){
        score += 100;
        combo++;
        showJudge("OK","lime");
    }
    else{
        combo = 0;
        showJudge("BAD","red");
    }

    closest.remove();
    notes.splice(closestIndex,1);
    updateScore();
}

function showJudge(text,color){
    judgeText.textContent = text;
    judgeText.style.color = color;
}

function updateScore(){
    scoreBoard.textContent =
        "Score: "+score+" | Combo: "+combo;
}

document.addEventListener("keydown",e=>{
    if(e.key==="f"||e.key==="F") hit("don");
    if(e.key==="j"||e.key==="J") hit("ka");
});

setInterval(()=>{
    spawn(Math.random()>0.5?"don":"ka");
},250);

update();
</script>

</body>
</html>
