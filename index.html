<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>1/2を10連続当てろ</title>
<style>
body {
    background: #111;
    color: #fff;
    font-family: sans-serif;
    text-align: center;
    padding-top: 80px;
}
h1 {
    font-size: 28px;
}
button {
    font-size: 20px;
    padding: 15px 40px;
    margin: 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}
#left { background: #3498db; color: white; }
#right { background: #e74c3c; color: white; }
button:hover {
    transform: scale(1.1);
}
#result {
    margin-top: 30px;
    font-size: 20px;
    min-height: 60px;
}
#streak {
    font-size: 24px;
    margin-top: 20px;
}
</style>
</head>
<body>

<h1>二分の一を10連続で当てろ</h1>
<p>左か右を選べ。外したら地獄。</p>

<div id="streak">現在の連続成功: 0 / 10</div>

<button id="left" onclick="play(0)">左</button>
<button id="right" onclick="play(1)">右</button>

<div id="result"></div>

<script>
let streak = 0;

const insults = [
    "はい終了。10分の1にも届かない集中力。伝説の雑魚。",
    "この程度も当てられないのに挑戦者気取り？笑わせないで。",
    "今の外し方、逆に才能ある。負けの。",
    "脳みそログアウトしてた？それとも運が逃げた？",
    "その自信どこから来たの。根拠ゼロで草。",
    "期待値以前に期待できない。",
    "1/2だよ？それすら越えられないって奇跡だね。悪い意味で。",
    "今ので10連とか言ってたの？夢見すぎ。",
    "その手でよくマウス持てたね。",
    "また最初から。人生リセット感覚でどうぞ。"
];

function play(choice) {
    const random = Math.floor(Math.random() * 2);

    if (choice === random) {
        streak++;
        document.getElementById("streak").textContent =
            "現在の連続成功: " + streak + " / 10";

        document.getElementById("result").textContent =
            "成功。まあ1/2だしね。";

        if (streak === 10) {
            document.getElementById("result").textContent =
                "10連成功。正直ちょっとだけ認める。確率1/1024を突破。やるじゃん。";
            streak = 0;
            document.getElementById("streak").textContent =
                "現在の連続成功: 0 / 10";
        }
    } else {
        const insult = insults[Math.floor(Math.random() * insults.length)];
        document.getElementById("result").textContent = insult;
        streak = 0;
        document.getElementById("streak").textContent =
            "現在の連続成功: 0 / 10";
    }
}
</script>

</body>
</html>
